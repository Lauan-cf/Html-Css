<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto Cordel</title>
    <link rel="shortcut icon" href="logo-html-css-arrendodado-que-desbuga1 copy.ico" type="image/x-icon">
    <style>
        *
        {
            margin:0;
            padding: 0;

        }
        body
        {
            background-color: white;
        }
        #background1
        {
            height: 1200px;
            max-width: 3000px;
            background: black url(imagens/background001.jpg) center center no-repeat fixed;
            background-size: cover;
            background-image: url(imagens/background001.jpg);
        }
        header
        {
            background-color: black;
            height: 400px;  
            max-width: 1905px;
            position: relative;
        }
        header h1
        {
            position: absolute;
            font-size: 6em;
            max-width: 1000px;
            left:50%;
            top: 50%;
            color: white;
            transform: translate(-50%, -50%);

        }
        header p
        {
            position: absolute;
            color: white;
            font-size: 2em;
            left:50%;
            top: 65%;
            transform: translate(-50%, -50%);
            
        }
    </style>
</head>
<body>
    
    <div id="background1">
        <header>
        <h1>Cordel Moderno</h1>
        <p>por <span style="font-weight: bold;">Milton Duarte</span></p>
    </header>
    </div>
</body>
</html>
