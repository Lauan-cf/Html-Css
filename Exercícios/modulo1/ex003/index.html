<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste com Imagens</title>
</head>
<body>
    <h1>Testando imagens</h1>
    <p>Podemos carregar uma imagem de uma mesma pasta:</p>
    <img src="logo-html.png" alt="Logo do Html 5">
    <p>Também podemos carregar imagens de sub-pastas:</p>
    <img src="imagens/logo-css.png" alt="Logo do CSS 3">
    <p>E além disso até carregar imagens da web(sem baixá-las):</p>
    <img src="https://upload.wikimedia.org/wikipedia/commons/3/3b/Javascript_Logo.png" alt="Logo do Javascript">
</body>
</html>
