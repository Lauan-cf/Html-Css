<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="logo-html-css-arrendodado-que-desbuga1.ico" type="image/x-icon">
    <title>Fontes Externas</title>
    <style>
        @font-face {
            font-family: 'Christmas';
            src: url('fontes/Christmas Buttermilk.otf') format('opentype')/*, url('Christmas Buttermilk') format('outro formato') (se quiser adicionar mais um)*/;
            font-weight: normal;
            font-style: normal;
            /*
                Tipos de format():
                - opentype (otf)
                - truetype (ttf)
                - embedded-opentype
                - truetype-aat (Apple Advanced Typography)
                - svg
            */
        }
        body
        {
            font-family: Arial, Helvetica, sans-serif;
        }
        h1
        {
            font-family: 'Christmas', Times, serif;
            font-size: 3em;
            font-weight: normal;
        }
    </style>
</head>
<body>
    <h1>Título</h1>
    <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit. Harum sequi magnam ab atque, aliquam expedita voluptatem explicabo ea id voluptatibus ducimus nostrum voluptatum? Numquam asperiores adipisci nam ipsam in quasi?</p>
</body>
</html>
