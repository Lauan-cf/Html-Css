<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="logo-html-css-arrendodado-que-desbuga1.ico" type="image/x-icon">
    <style>
        div
        {
            display: inline-block;
            background-color: lightcoral;
            height: 200px;
            width: 200px;
            text-align: center;
            border: 1px solid black
        }

        /* Pseudo-classes são representadas pelo símbolo ':' */
        /* Elas são, basicamente, como condições de algo, como o exemplo abaixo que ativa quando o mouse estiver sobre a div */
        div:hover
        {
            background-color: rgba(255, 0, 0, 0.779);
        }
    </style>
    <title>Pseudo-classes</title>
</head>
<body>
    <div>01</div>
    <div>02</div>
    <div>03</div>
</body>
</html>
