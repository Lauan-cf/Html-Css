<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alinhamento Vertical</title>
    <link rel="shortcut icon" href="logo-html-css-arrendodado-que-desbuga1 copy.ico" type="image/x-icon">
    <style>
        #container
        {
            background-image: url(imagens-cap19/target001.png);
            position: relative;
            height: 96vh;
            padding: 10px;
            background-color: purple;
            background-size:100% 100%;
        }
        #conteudo
        {
            background-image: url(imagens-cap19/target001.png);
            position: absolute;
            height: 200px;
            width: 400px;
            background-color: yellow;
            top: 50%;
            left: 50%;
            background-size:100% 100%;
            /*transform: translate("tamanho para esquerda", "tamanho para baixo")*/
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>
    <section id="container">
        <article id="conteudo">

        </article>
    </section>
</body>
</html>
